<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Panel · CampusPath</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<button id="menu-toggle" class="menu-toggle">☰ Menu</button>
<div class="app">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div><h1>TPO Admin Panel</h1><p>Oversee students, drives, and recruiter activity.</p></div>
      <button class="btn btn-primary" onclick="alert('Open new opportunity form')">+ Post Opportunity</button>
    </div>

    <section class="grid grid-4" style="margin-bottom:1.25rem">
      <div class="card stat"><div class="label">Total Students</div><div class="value">412</div><div class="delta">Class of 2026</div></div>
      <div class="card stat"><div class="label">Placed</div><div class="value">287</div><div class="delta">69.6% conversion</div></div>
      <div class="card stat"><div class="label">Active Drives</div><div class="value">18</div><div class="delta">This month</div></div>
      <div class="card stat"><div class="label">Recruiting Companies</div><div class="value">64</div><div class="delta">+12 this season</div></div>
    </section>

    <section class="grid grid-2">
      <div class="card">
        <h2>Live opportunities</h2>
        <p style="color:var(--muted);margin:.25rem 0 1rem">Manage open postings.</p>
        <table>
          <thead><tr><th>Role</th><th>Company</th><th>Type</th><th>Deadline</th><th></th></tr></thead>
          <tbody id="op-rows"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>Recent activity</h2>
        <div class="activity" id="activity" style="margin-top:.75rem"></div>
      </div>
    </section>
  </main>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
renderSidebar('admin');
document.getElementById('op-rows').innerHTML = opportunities.map(o=>`<tr>
  <td><strong>${o.role}</strong></td><td>${o.company}</td>
  <td><span class="badge ${o.type==='Internship'?'badge-accent':'badge-primary'}">${o.type}</span></td>
  <td>${fmtDate(o.deadline)}</td>
  <td><button class="btn btn-ghost" onclick="alert('Manage ${o.role}')">Manage</button></td>
</tr>`).join('');
document.getElementById('activity').innerHTML = recentTpoActivity.map(a=>`
  <div class="activity-item"><div class="activity-dot"></div>
    <div style="flex:1"><div class="who">${a.who}</div>
    <div style="color:#3a4763;font-size:.85rem">${a.action}</div>
    <div class="when">${a.when}</div></div></div>`).join('');
</script>
</body>
</html>
